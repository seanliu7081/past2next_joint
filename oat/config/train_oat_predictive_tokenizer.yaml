defaults:
  - _self_
  - task/policy: libero/libero10_with_past

name: train_oat_predictive_tokenizer
_target_: oat.workspace.train_predictive_tokenizer.TrainPredictiveTokenizerWorkspace

seed: 42
horizon: 16
n_action_steps: 8
n_obs_steps: 2
past_n: 7
task_name: ${task.policy.name}
shape_meta: ${task.policy.shape_meta}
action_dim: ${task.policy.shape_meta.action.shape[0]}

latent_dim: ${eval:'len(${policy.action_tokenizer.quantizer.levels})'}

policy:
  _target_: oat.policy.oat_policy_predictive_tokenizer.OATPolicyPredictiveTokenizer

  shape_meta: ${shape_meta}
  n_action_steps: ${n_action_steps}
  n_obs_steps: ${n_obs_steps}
  past_n: ${past_n}

  obs_encoder:
    _target_: oat.perception.fused_obs_encoder.FusedObservationEncoder
    _recursive_: false
    shape_meta: ${shape_meta}

    vision_encoder:
      _target_: oat.perception.robomimic_vision_encoder.RobomimicRgbEncoder
      crop_shape: [76, 76]

    state_encoder:
      _target_: oat.perception.state_encoder.ProjectionStateEncoder
      out_dim: null   # identity projection

  # trainable action tokenizer (built from scratch, NOT from_checkpoint)
  action_tokenizer:
    _target_: oat.tokenizer.oat.tokenizer.OATTok

    encoder:
      _target_: oat.tokenizer.oat.encoder.register_encoder.RegisterEncoder
      sample_dim: ${action_dim}
      sample_horizon: ${horizon}
      emb_dim: 256
      head_dim: 64
      depth: 2
      pdropout: 0.1
      latent_dim: ${latent_dim}
      num_registers: 8

    decoder:
      _target_: oat.tokenizer.oat.decoder.single_pass_decoder.SinglePassDecoder
      sample_dim: ${action_dim}
      sample_horizon: ${horizon}
      emb_dim: 256
      head_dim: 64
      depth: 4
      pdropout: 0.1
      token_dropout_mode: 'pow2'
      latent_dim: ${latent_dim}
      latent_horizon: ${policy.action_tokenizer.encoder.num_registers}
      use_causal_decoder: true

    quantizer:
      # FSQ is parameter-free; in the predictive-tokenizer policy it is used only
      # for its `levels`/`codebook_size` geometry. Quantization at train/infer
      # time goes through factorized soft-FSQ in the policy.
      _target_: oat.tokenizer.oat.quantizer.fsq.FSQ
      levels: [8, 5, 5, 5, 5]

  # backbone model params
  embed_dim: 256
  n_layers: 4
  n_heads: 4
  dropout: 0.1
  # policy inference params
  temperature: 1.0
  topk: 10

  # ── rate-distortion loss params (static) ─────────────────────────────────
  ar_head_mode: factorized
  w_rec: 1.0                  # distortion weight
  w_use: 1.0e-2               # light marginal-usage insurance
  free_bits: ${training.free_bits}   # per-dim rate floor (nats); single source of truth
  beta: 0.0                   # initial beta (overridden each epoch by the schedule)
  tau_start: ${training.tau_start}
  tau_end: ${training.tau_end}

training:
  resume: True
  allow_bf16: True
  max_grad_norm: 1.0
  num_epochs: 5001

  # ── rate-distortion schedule (driven by the workspace) ───────────────────
  tokenizer_warmup_epochs: 50   # Stage 0: beta=0, learn a non-degenerate recon code first
  beta: 0.1                     # rate weight target
  beta_ramp_epochs: 100         # linear ramp 0 -> beta after warmup
  # beta during the hard-token finetune phase. Keep > 0 (here = target): the
  # decode path is already hard in every phase (straight-through z_st), so the
  # rate term is the ONLY way the hard teacher-forcing inputs train the AR.
  # beta_hard=0 would make the mandated hard finetune a no-op for the AR.
  beta_hard: 0.1
  free_bits: 0.05               # per-dim free-bits floor (nats), anti per-axis collapse
  tau_start: 2.0                # temperature anneal start (smooth q, stable grads)
  tau_end: 0.25                 # temperature anneal end (sharp q, faithful ST decode)
  tau_anneal_epochs: 200        # linear anneal length
  hard_finetune_epochs: 50      # last K epochs: hard argmax decode + hard teacher forcing

  val_every: 10
  sample_every: 10
  rollout_every: 100
  checkpoint_every: 10
  lr_scheduler: constant
  lr_warmup_steps: 100
  gradient_accumulate_every: 1
  max_train_steps: null
  max_val_steps: null
  max_reconst_steps: null
  seed: ${seed}
  use_ema: True
  num_demo: 500
  tqdm_interval_sec: 1.0

ema:
  _target_: oat.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

optimizer:
  policy_lr: 5.0e-5
  obs_enc_lr: 1.0e-5
  tokenizer_lr: 5.0e-5
  weight_decay: 0.0
  betas: [0.9, 0.95]

dataloader:
  batch_size: 64
  num_workers: 2
  shuffle: True
  pin_memory: True
  persistent_workers: True
  drop_last: True

val_dataloader:
  batch_size: 64
  num_workers: 2
  shuffle: False
  pin_memory: True
  persistent_workers: True
  drop_last: True

logging:
  project: oat_dev
  resume: True
  mode: online
  name: ${now:%Y%m%d.%H%M%S}_${name}_${task_name}_N${training.num_demo}
  tags: ["${name}", "${task_name}"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: mean_success_rate
    mode: max
    k: 3
    format_str: 'ep-{epoch:04d}_sr-{mean_success_rate:.3f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False

multi_run:
  run_dir: output/${now:%Y%m%d}/${now:%H%M%S}_${name}_${task_name}_N${training.num_demo}
  wandb_name_base: ${now:%Y%m%d.%H%M%S}_${name}_${task_name}_N${training.num_demo}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: output/${now:%Y%m%d}/${now:%H%M%S}_${name}_${task_name}_N${training.num_demo}
  sweep:
    dir: output/${now:%Y%m%d}/${now:%H%M%S}_${name}_${task_name}_N${training.num_demo}
    subdir: ${hydra.job.num}
